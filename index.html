<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Quest</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    text-align: center;
}
    .title {
    font-family: 'Press Start 2P', cursive;
    font-size: clamp(18px, 3vw, 32px);
    line-height: 1.5;
    margin-bottom: 25px;
    text-shadow:
        0 0 10px rgba(0,229,255,0.6),
        0 0 20px rgba(0,229,255,0.4);
    }

/* screens */
.screen { display:none; padding:40px; }

/* password */
#passwordScreen {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input, button {
    padding:10px;
    margin-top:10px;
}

/* grid */
.grid {
    display:grid;
    grid-template-columns:repeat(3,80px);
    gap:10px;
    justify-content:center;
    margin-top:30px;
}

.block {
    width:80px;
    height:80px;
    background:#444;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.diamond { background:#00e5ff; }

/* chest */
.chest { font-size:70px; cursor:pointer; }

/* ===== CINEMATIC ENVELOPE ===== */

#envelopeScreen::before {
    content:"";
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    transition:0.6s;
    pointer-events:none;
}

#envelopeScreen.cinematic::before {
    opacity:0.6;
}

.scene { perspective:1000px; }

.envelope {
    width:260px;
    height:170px;
    margin:auto;
    position:relative;
    cursor:pointer;
    transition:0.6s;
}

.envelope .body {
    position:absolute;
    width:100%;
    height:100%;
    background:#8fd3ff;
}

.envelope .flap {
    position:absolute;
    width:0;height:0;
    border-left:130px solid transparent;
    border-right:130px solid transparent;
    border-top:90px solid #6bbbe8;
    transform-origin:top;
    transition:0.8s;
}

.envelope.open {
    transform:scale(0.95) translateY(-10px);
    filter:drop-shadow(0 0 20px #8fd3ff);
}

.envelope.open .flap {
    transform:rotateX(180deg);
}

/* letter */
.letter-box {
    display:none;
    margin-top:30px;
    animation:rise 1s ease;
}

@keyframes rise {
    from {transform:translateY(60px); opacity:0;}
    to {transform:translateY(-10px); opacity:1;}
}

.letter-img {
    width:300px;
    max-width:90%;
    border-radius:10px;
}

#downloadBtn {
    display:block;
    margin-top:10px;
    padding:10px;
    background:white;
    color:black;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="passwordScreen">
    <h2>Enter Password</h2>
    <input id="pass" placeholder="What is the name of our playlist ?">
    <button onclick="checkPassword()">Enter</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <h1 class="title">Happy Birthday, My Love</h1>
<p>Find the hidden diamond (that's you)...</p>
    <div class="grid" id="grid"></div>
</div>

<!-- CHEST -->
<div id="chestScreen" class="screen">
    <div class="chest" onclick="openChest()">📦</div>
</div>

<!-- ENVELOPE -->
<div id="envelopeScreen" class="screen">
    <p>I hope I can show how freaking much I love you, Here's a little smth 🤍</p>

    <div class="scene">
        <div class="envelope" id="envelope" onclick="openEnvelope()">
            <div class="body"></div>
            <div class="flap"></div>
        </div>
    </div>

    <div class="letter-box" id="letterBox">
        <img id="letterImage" class="letter-img">
        <a id="downloadBtn" download="letter.jpg">Download Letter</a>
    </div>
</div>

<script>

function checkPassword() {
    let input = document.getElementById("pass").value.trim().toLowerCase();
    if (input === "sweet as cupcake") {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("game").style.display = "block";
        startGame();
    } else {
        alert("Try again, baby 💗");
    }
}

function startGame() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for (let i=0;i<9;i++) {
        let b=document.createElement("div");
        b.className="block";

        if(i===4){
            b.classList.add("diamond");
            b.innerHTML="💎";
            b.onclick=foundDiamond;
        } else {
            b.innerHTML="🪨";
            b.onclick=()=>b.innerHTML="empty";
        }

        grid.appendChild(b);
    }
}

function foundDiamond(){
    document.getElementById("game").style.display="none";
    document.getElementById("chestScreen").style.display="block";
}

function openChest(){
    document.getElementById("chestScreen").style.display="none";
    document.getElementById("envelopeScreen").style.display="block";
}

function openEnvelope(){
    const env=document.getElementById("envelope");
    const screen=document.getElementById("envelopeScreen");
    const box=document.getElementById("letterBox");

    screen.classList.add("cinematic");
    env.classList.add("open");

    setTimeout(()=>{
        box.style.display="block";

        const img=document.getElementById("letterImage");
        const btn=document.getElementById("downloadBtn");

        img.src="letter.jpg";
        btn.href=img.src;

    },900);
}

</script>

</body>
</html>
