<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        :root {
            --bg-color: #DEEBF7;
            --envelope-color: #a3cfff;
            --navy: #2c3e50;
            --white: #ffffff;
        }

        body { margin: 0; font-family: sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #login { text-align: center; color: var(--navy); }
        input { padding: 12px; border: 2px solid var(--envelope-color); border-radius: 10px; margin-bottom: 10px; text-align: center; background: var(--white); }
        button { padding: 10px 20px; background: var(--envelope-color); border: none; color: white; border-radius: 10px; cursor: pointer; }

        #envelope-stage { display: none; perspective: 1000px; }
        .envelope { width: 250px; height: 180px; background: var(--envelope-color); border-radius: 10px; position: relative; cursor: pointer; transition: 0.6s; transform-style: preserve-3d; border: 2px solid var(--white); }
        .envelope.flipped { transform: rotateY(180deg); }
        
        .flap { 
            position: absolute; top: 0; 
            border-left: 125px solid transparent; 
            border-right: 125px solid transparent; 
            border-top: 90px solid var(--envelope-color); 
            transition: 0.5s; 
        }

        .flap::before { content: "❤️❤️❤️"; position: absolute; top: -45px; left: -110px; font-size: 14px; transform: rotate(-35deg); color: #ff6b6b; }
        .flap::after { content: "❤️❤️❤️"; position: absolute; top: -45px; right: -110px; font-size: 14px; transform: rotate(35deg); color: #ff6b6b; }
        
        /* The back of the envelope */
        #back-text { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            transform: rotateY(180deg); color: var(--navy); font-weight: bold; 
            backface-visibility: hidden; 
        }

        #letter { position: absolute; top: 10px; left: 10px; width: 230px; height: 160px; background: var(--white); transition: 1s; opacity: 0; z-index: -1; padding: 5px; text-align: center; }
        .envelope.open #letter { opacity: 1; top: -100px; z-index: 1; }
    </style>
</head>
<body>

    <div id="login">
        <p>What is the name of our playlist?</p>
        <input type="text" id="pass" placeholder="lowercase only">
        <br>
        <button onclick="check()">Enter</button>
    </div>

    <div id="envelope-stage">
        <div class="envelope" id="env" onclick="this.classList.toggle('flipped')" ondblclick="openEnv()">
            <div class="flap"></div>
            <div id="back-text">Happy birthday baby !</div>
            <div id="letter">
                <img src="letter.png" style="width:100%; height:80%; object-fit:contain;">
                <a href="letter.png" download="My_Letter.png" onclick="event.stopPropagation()" style="display: block; font-size: 10px; color: var(--navy);">Download</a>
            </div>
        </div>
        <p style="text-align:center; color: var(--navy); font-size: 0.8em; margin-top: 20px;">
            Tap once to flip, double-tap to open.
        </p>
    </div>

    <script>
        function check() {
            if(document.getElementById('pass').value.toLowerCase() === "sweet as cupcake") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('envelope-stage').style.display = 'block';
            } else {
                alert("Not the right playlist!");
            }
        }
        function openEnv() {
            document.getElementById('env').classList.add('open');
        }
    </script>
</body>
</html>
